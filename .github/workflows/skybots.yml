name: 🤖 Skybots Auto Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

jobs:
  run_renewal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # 新增权限：允许 GitHub 令牌对当前仓库的 Actions 记录进行删除操作
    permissions:
      actions: write

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          path: .

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安装底层依赖与浏览器
        run: |
          # 【核心】安装 xdotool(用于物理点击) 和 xvfb(虚拟屏幕)
          sudo apt-get update
          sudo apt-get install -y xvfb xdotool
          
          # 安装 SeleniumBase 并初始化 Chrome
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🛡️ 启动 GOST 代理隧道
        env:
          skybots_PROXY_NODE: ${{ secrets.skybots_PROXY_NODE }}
        run: |
          if [ -z "$skybots_PROXY_NODE" ]; then exit 0; fi
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          nohup ./gost-linux-amd64-2.11.5 -L :8080 -F "$skybots_PROXY_NODE" > gost.log 2>&1 &
          sleep 5
          # 将生成的本地 socks5 代理地址传给 Python 脚本对应的变量
          echo "skybots_PROXY_NODE=socks5://127.0.0.1:8080" >> $GITHUB_ENV

      - name: 🚀 运行 Skybots Python 脚本
        env:
          SKYBOTS_ACCOUNT: ${{ secrets.SKYBOTS_ACCOUNT }}
          SKYBOTS_PASSWORD: ${{ secrets.SKYBOTS_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 使用 xvfb-run 分配虚拟屏幕，让 xdotool 能够正常点击
          xvfb-run -a python skybots.py

      - name: 🗑️ 清理旧工作流记录 (仅保留最近 5 个)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 仅针对当前工作流，列出所有运行记录 ID，跳过前 5 个，然后逐个删除
          gh run list --workflow "${{ github.workflow }}" --json databaseId -q '.[5:][].databaseId' | xargs -r -I{} gh run delete "{}" || true
